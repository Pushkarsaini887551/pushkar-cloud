<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushkar Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🚀 Welcome to Pushkar Cloud</h1>
        <p>Website is under development.</p>
    </header>

    <main>
        <section id="auth-section">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <br>
            <button id="loginBtn">Login</button>
            <button id="signupBtn">Signup</button>
        </section>

        <section id="upload-section" style="margin-top: 30px;">
            <input type="file" id="fileInput" multiple accept="image/*,video/*">
            <button id="uploadBtn">Upload</button>
        </section>

        <div id="gallery" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; padding: 20px; border-top: 2px solid #38bdf8;">
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
